<header class="site-header">
  <div class="brand">
    <span class="brand-name">Bar Mleczny Nowa</span>
    <span class="brand-sub" i18n="@@brandSub">ordering &amp; reservations</span>
  </div>
  <nav aria-label="Main" i18n-aria-label="@@navLabel">
    <a routerLink="/menu" routerLinkActive="active" i18n="@@navMenu">Menu</a>
    <a routerLink="/cart" routerLinkActive="active">
      <span i18n="@@navCart">Cart</span>
      @if (cart.count() > 0) {
        <span class="cart-badge" aria-hidden="true">{{ cart.count() }}</span>
        <span class="sr-only" i18n="@@cartItems">items in cart: {{ cart.count() }}</span>
      }
    </a>
    <a routerLink="/reserve" routerLinkActive="active" i18n="@@navReserve">Reserve a table</a>
  </nav>
  <div class="lang-switch" role="group" aria-label="Language" i18n-aria-label="@@langLabel">
    <a
      href="../en-US/"
      [class.active]="locale === 'en-US'"
      [attr.aria-current]="locale === 'en-US' ? 'true' : null"
      hreflang="en"
      >EN</a
    >
    <a
      href="../pl/"
      [class.active]="locale === 'pl'"
      [attr.aria-current]="locale === 'pl' ? 'true' : null"
      hreflang="pl"
      >PL</a
    >
  </div>
  <button
    type="button"
    class="mode-chip"
    [class.mock]="mode.mode() === 'mock'"
    (click)="mode.toggle()"
    [attr.aria-label]="'Backend mode: ' + mode.mode() + '. Activate to toggle.'"
  >
    {{ mode.mode() }}
  </button>
</header>

<main id="main-content" tabindex="-1">
  <router-outlet />
</main>

<footer class="site-footer">
  <span i18n="@@footer">RestOS demo — synthetic data, no real restaurant.</span>
  <a href="https://github.com/arcsymer/restos-web">GitHub</a>
</footer>

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # keep the redirect relative so it works behind a mapped host port (e.g. :8081)
    absolute_redirect off;

    # localized build: each locale is its own SPA under /<locale>/
    location = / {
        return 302 /en-US/;
    }

    location /en-US/ {
        try_files $uri $uri/ /en-US/index.html;
    }

    location /pl/ {
        try_files $uri $uri/ /pl/index.html;
    }

    # hashed static assets
    location ~* \.(?:js|css|woff2?|png|jpe?g|svg|ico|json)$ {
        try_files $uri =404;
        expires 1h;
        access_log off;
    }
}
